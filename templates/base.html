<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}LAGC Autistic Women's Lunch{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <a href="/">🍽️ LAGC Autistic Women's Lunch</a>
        </div>
        <div class="nav-links">
            <a href="/" class="nav-link">Home</a>
            <a href="/book" class="nav-link">Book Lunch</a>
            <a href="/admin" class="nav-link">Admin</a>
        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <p>London Autism Group Charity - Autistic Women's Lunch</p>
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
