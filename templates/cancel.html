{% extends "base.html" %}

{% block title %}Cancel Booking - LAGC Autistic Women's Lunch{% endblock %}

{% block content %}
<div class="cancel-page">
    <div id="booking-details">
        <p class="loading">Loading booking details...</p>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const token = '{{ token }}';

async function loadBooking() {
    const container = document.getElementById('booking-details');
    
    try {
        const response = await fetch(`/api/booking/${token}`);
        const data = await response.json();
        
        if (!response.ok) {
            container.innerHTML = `
                <div class="error-message">
                    <h2>Booking Not Found</h2>
                    <p>${data.error || 'Unable to find this booking.'}</p>
                </div>
            `;
            return;
        }
        
        container.innerHTML = `
            <div class="booking-card">
                <h2>Your Booking</h2>
                <div class="detail-row">
                    <span class="label">Name:</span>
                    <span class="value">${escapeHtml(data.first_name)} ${escapeHtml(data.last_name)}</span>
                </div>
                <div class="detail-row">
                    <span class="label">Email:</span>
                    <span class="value">${escapeHtml(data.email)}</span>
                </div>
                <div class="detail-row">
                    <span class="label">Date:</span>
                    <span class="value">${escapeHtml(data.date_display)}</span>
                </div>
                <div class="detail-row">
                    <span class="label">Order:</span>
                    <span class="value">${escapeHtml(data.main_course)} + ${escapeHtml(data.drink)}</span>
                </div>
            </div>
            
            <div class="cancel-actions">
                <p class="warning">Are you sure you want to cancel this booking?</p>
                <button class="btn btn-danger" onclick="cancelBooking()">Yes, Cancel My Booking</button>
                <a href="/" class="btn btn-secondary">No, Keep My Booking</a>
            </div>
        `;
    } catch (error) {
        container.innerHTML = '<p class="error-text">Failed to load booking details.</p>';
    }
}

async function cancelBooking() {
    if (!confirm('Are you sure? This cannot be undone.')) return;
    
    try {
        const response = await fetch(`/api/cancel/${token}`, { method: 'POST' });
        const data = await response.json();
        
        const container = document.getElementById('booking-details');
        
        if (response.ok) {
            container.innerHTML = `
                <div class="success-message">
                    <h2>Booking Cancelled</h2>
                    <p>Your booking has been cancelled successfully.</p>
                    <a href="/" class="btn btn-primary">Return to Home</a>
                </div>
            `;
        } else {
            container.innerHTML = `
                <div class="error-message">
                    <h2>Error</h2>
                    <p>${data.error || 'Failed to cancel booking.'}</p>
                </div>
            `;
        }
    } catch (error) {
        alert('Network error. Please try again.');
    }
}

function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

// Load booking on page load
document.addEventListener('DOMContentLoaded', loadBooking);
</script>
{% endblock %}
